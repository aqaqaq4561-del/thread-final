    <rect x="-30" y="-5" width="10" height="30" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="-14" y="-20" width="10" height="45" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="2" y="-12" width="10" height="37" rx="2" fill="#fff" opacity="0.9"/>
    <rect x="18" y="-28" width="10" height="53" rx="2" fill="#fff" opacity="0.9"/>
    <!-- Connection dots -->
    <circle cx="-25" cy="-15" r="3" fill="#e0e7ff"/>
    <circle cx="-9" cy="-30" r="3" fill="#e0e7ff"/>
    <circle cx="7" cy="-22" r="3" fill="#e0e7ff"/>
    <circle cx="23" cy="-38" r="3" fill="#e0e7ff"/>
    <!-- Connection lines -->
